resource:
    name: autoai_experiment
    service: watsonx_ai
    kind: autoai_experiment
    version: v1
    description: >
        An AutoAI Experiment runs a watsonx.ai AutoAI training to completion and surfaces the
        ranked pipeline leaderboard. Create is a two-call sequence performed by the handler:
        POST /ml/v4/pipelines stores an AutoAI pipeline document (doc_type: pipeline,
        runtime auto_ai.kb, one execution_node carrying the optimization label / learning_type
        / scorer_for_ranking / holdout_param), then POST /ml/v4/trainings submits the training
        against the data asset with a container results_reference. The handler then polls the
        training (GET /ml/v4/trainings/{id}) until it reaches a terminal state; on completed,
        entity.status.metrics[] holds the leaderboard. A run is immutable — any field change
        recreates. Destroy hard-deletes the training and the stored pipeline (404-tolerant).
    api:
        base_path: /ml/v4/trainings
        id_field: id
        list_endpoint: /ml/v4/trainings?version=2024-01-01
        get_endpoint: /ml/v4/trainings/{id}?version=2024-01-01
        create_endpoint: /ml/v4/trainings?version=2024-01-01
        create_method: POST
        delete_endpoint: /ml/v4/trainings/{id}?version=2024-01-01&hard_delete=true
        delete_method: DELETE
    schema:
        fields:
            - name: name
              type: string
              required: true
              immutable: true
              description: Experiment / training run name.
              validation:
                  min_length: 1
                  max_length: 250
            - name: training_data
              type: string
              required: true
              immutable: true
              description: >
                  Asset id of the training data (a data_asset). Used to build the training's
                  training_data_references entry (type: data_asset).
              references:
                  resource: data_asset
                  field: asset_id
            - name: prediction_type
              type: string
              required: true
              immutable: true
              allowed_values: [binary, multiclass, regression]
              description: AutoAI learning task type.
            - name: prediction_column
              type: string
              required: true
              immutable: true
              description: Target/label column name in the training data.
            - name: scoring
              type: string
              required: false
              immutable: true
              description: >
                  Optimization metric (scorer_for_ranking), e.g. accuracy / roc_auc / neg_root_mean_squared_error.
                  Omit to let AutoAI choose the default for the prediction_type.
            - name: holdout_size
              type: float
              required: false
              immutable: true
              description: Holdout fraction (0.0–1.0) carried into optimization.holdout_param.
            - name: include_only_estimators
              type: array
              required: false
              item_type: string
              immutable: true
              description: Restrict AutoAI to these estimator names (optional).
            - name: t_shirt_size
              type: string
              required: false
              immutable: true
              description: Compute size for the AutoAI run (cluster default if omitted).
            - name: space_id
              type: string
              required: false
              also_query: true
              immutable: true
              description: The space ID scope. Sent in body on create, query param on get/list/delete.
              references:
                  resource: space
                  field: id
                  optional: true
            - name: project_id
              type: string
              required: false
              also_query: true
              immutable: true
              description: The project ID scope. Sent in body on create, query param on get/list/delete.
              references:
                  resource: project
                  field: id
                  optional: true
            - name: id
              type: string
              required: false
              location: Computed
              immutable: true
              description: Training run id.
            - name: pipeline_id
              type: string
              required: false
              location: Computed
              immutable: true
              description: Id of the stored AutoAI pipeline document (deleted on destroy).
            - name: state
              type: string
              required: false
              location: Computed
              immutable: true
              description: Terminal training state (completed / failed / canceled).
            - name: best_pipeline
              type: object
              required: false
              location: Computed
              immutable: true
              description: Top-ranked pipeline (name + score) extracted from the leaderboard.
            - name: leaderboard
              type: array
              required: false
              location: Computed
              immutable: true
              description: Ranked pipeline metrics from entity.status.metrics.
    reconciliation:
        discovery:
            method: list_and_get
            id_source: id
            list_field: resources
        # A completed AutoAI run is immutable and identified by name. Its create-time
        # inputs (prediction_type, scoring, holdout, …) are baked into the stored
        # pipeline document and are NOT echoed on the training GET, so comparing them
        # against a discovered run always reports false drift → spurious recreate.
        # Identity is therefore `name` only: a matching completed run re-plans clean;
        # to launch a different run, change the experiment name.
        state_fields:
            - name
        update_strategy: recreate
        immutable_fields:
            - name
        use_json_patch: false

    deployments:
        "software-5.3":
            api: {}
    unsupported_on: []
