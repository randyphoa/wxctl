resource:
    name: ai_service
    service: watsonx_ai
    kind: ai_service
    version: v1
    description: >
        An AI Service is a deployable code artifact for Watson Machine Learning. AI services package Python
        functions that can be deployed as online endpoints for real-time scoring and inference. The create
        flow is two-step: metadata creation followed by code upload.
    api:
        base_path: /ml/v4/ai_services
        id_field: id
        list_endpoint: /ml/v4/ai_services?version=2024-01-01
        get_endpoint: /ml/v4/ai_services/{id}?version=2024-01-01
        create_endpoint: /ml/v4/ai_services?version=2024-01-01
        create_method: POST
        update_endpoint: /ml/v4/ai_services/{id}?version=2024-01-01
        update_method: PATCH
        delete_endpoint: /ml/v4/ai_services/{id}?version=2024-01-01
        delete_method: DELETE
    schema:
        fields:
            - name: name
              type: string
              required: true
              description: >
                  Name of the AI service.
              validation:
                  min_length: 1
            - name: description
              type: string
              required: false
              description: >
                  Human-readable description.
            - name: tags
              type: array
              required: false
              item_type: string
              description: >
                  Tags for categorization.
            - name: software_spec
              type: string
              required: true
              description: >
                  Software specification ID. References a software_specification resource.
              references:
                  resource: software_specification
                  field: asset_id
            - name: space_id
              type: string
              required: false
              also_query: true
              description: The space ID scope. Sent in body on create, used as query param on list/get/delete.
              references:
                  resource: space
                  field: id
                  optional: true
            - name: project_id
              type: string
              required: false
              also_query: true
              description: The project ID scope. Sent in body on create, used as query param on list/get/delete.
              references:
                  resource: project
                  field: id
                  optional: true
            - name: custom
              type: object
              required: false
              description: >
                  Arbitrary key-value metadata.
            - name: source_path
              type: string
              required: false
              location: LocalOnly
              is_path: true
              description: >
                  Local path to Python source file. Used by the post_create hook to upload code.
            - name: id
              type: string
              required: false
              location: Computed
              immutable: true
              description: AI service ID.
            - name: created_at
              type: timestamp
              required: false
              location: Computed
              immutable: true
              description: Creation timestamp.
    reconciliation:
        discovery:
            method: list_and_get
            id_source: id
            list_field: resources
        state_fields:
            - name
            - description
            - tags
            - custom
        update_strategy: patch
        immutable_fields: []
        use_json_patch: false
