resource:
  name: subscription
  service: openscale
  kind: subscription
  version: v1
  api:
    base_path: /v2/subscriptions
    id_field: id
    list_endpoint: /v2/subscriptions
    get_endpoint: /v2/subscriptions/{id}
    create_endpoint: /v2/subscriptions
    create_method: POST
    update_endpoint: /v2/subscriptions/{id}
    update_method: PATCH
    delete_endpoint: /v2/subscriptions/{id}
    delete_method: DELETE
  schema:
    # candidate-ref (tier2x:service_provider.integrated_project_id score=60): field `service_provider.integrated_project_id` may reference `project` (common_core/project)
    # candidate-ref (tier2x:service_provider.operational_space_id score=60): field `service_provider.operational_space_id` may reference `space` (common_core/space)
    # candidate-ref (tier2x:integration_reference.integrated_system_id score=60): field `integration_reference.integrated_system_id` may reference `system` (concert/system)
    # candidate-ref (tier2x:asset.foundational_model_id score=60): field `asset.foundational_model_id` may reference `model` (watsonx_ai/model)
    # candidate-ref (tier2x:asset.foundational_model_id score=60): field `asset.foundational_model_id` may reference `model` (watsonx_orchestrate/model)
    fields:
    - name: entity
      type: string
      immutable: true
      location: Computed
    - name: metadata
      type: string
      immutable: true
      location: Computed
    - name: analytics_engine
      type: object
    - name: asset
      type: object
      required: true
      schema:
        fields:
        - name: asset_id
          type: string
          required: true
          references:
            resource: wml_deployment
            field: id
        - name: asset_type
          type: string
          required: true
    - name: asset_properties
      type: string
      description: Additional asset properties (subject of discovery if not provided when creating the subscription)
    - name: data_mart_id
      type: string
      required: true
      validation:
        pattern: '[a-z0-9_\-]+'
      references:
        resource: data_mart
        field: id
    - name: data_sources
      type: array
      item_type: string
    - name: deployment
      type: object
      required: true
      schema:
        fields:
        - name: deployment_id
          type: string
          required: true
          references:
            resource: wml_deployment
            field: id
        - name: name
          type: string
          required: true
        - name: deployment_type
          type: string
          required: true
    - name: risk_evaluation_status
      type: object
    - name: service_provider_id
      type: string
      required: true
      references:
        resource: service_provider
        field: id
  reconciliation:
    # TODO(verify): deployments / unsupported_on — add per-deployment api overlays + unsupported constraints if SaaS/Software diverge.
    discovery:
      method: list_and_get
      list_field: subscriptions
      id_source: id
      identity_match:
        local_path: asset.asset_id
        remote_path: entity.asset.asset_id
    update_strategy: patch
    json_patch_path_prefix: ""
