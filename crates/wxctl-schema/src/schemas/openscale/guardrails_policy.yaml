      required: true
      validation:
        pattern: ^[a-zA-Z0-9 _.-]+$
    - name: description
      type: string
      validation:
        pattern: ^.*$
      description: Description of the policy
    - name: block_message
      type: string
      validation:
        pattern: ^.*$
      description: Message to display when content is blocked
    - name: mask_character
      type: string
      validation:
        pattern: ^.$
      description: Character to use for masking (e.g. "*")
    - name: input
      type: array
