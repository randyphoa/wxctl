      item_type: string
      description: Detector configurations for the input direction (array of {detector, action, detector_properties}).
    - name: output
      type: array
      required: true
      item_type: string
      description: Detector configurations for the output direction (array of {detector, action, detector_properties}).
    - name: policy_status
      type: string
      required: true
