resource:
  name: instana_synthetic_alert_config
  service: instana
  kind: instana_synthetic_alert_config
  version: v1
  description: >
    An Instana synthetic smart alert (SyntheticAlertConfig) evaluates a rule over
    one or more synthetic tests' results and routes triggered events to alerting
    channels. Created via the Events settings API
    (/api/events/settings/global-alert-configs/synthetics) and identified by a
    server-assigned string id; the human identifier is `name`. Update is the
    smart-alert quirk POST /{id} with the full config body (update_strategy:
    replace). DELETE is a SOFT delete — the active-configs list omits destroyed
    alerts, so discovery never resurrects one.
  # Instana's config API is identical on SaaS and self-hosted, so the kind is
  # deployment-neutral: no unsupported_on -> supported on saas + software.
  api:
    base_path: /api/events/settings/global-alert-configs/synthetics
    id_field: id
    list_endpoint: /api/events/settings/global-alert-configs/synthetics
    get_endpoint: /api/events/settings/global-alert-configs/synthetics/{id}
    create_endpoint: /api/events/settings/global-alert-configs/synthetics
    create_method: POST
    update_endpoint: /api/events/settings/global-alert-configs/synthetics/{id}
    # Smart-alert family quirk: update is POST /{id}.
    update_method: POST
    delete_endpoint: /api/events/settings/global-alert-configs/synthetics/{id}
    delete_method: DELETE
  schema:
    fields:
      # -- Server-assigned / read-model metadata (read-only; excluded from state_fields) --
      - name: id
        type: string
        location: Computed
        immutable: true
        description: Server-assigned synthetic-alert-config id (top-level `id` on create/list/get).
      # -- Writable (SyntheticAlertConfig) --
      - name: name
        type: string
        required: true
        description: Smart-alert display name; Instana's human identifier (matched on during discovery).
      - name: description
        type: string
        required: true
        description: Alert description shown on triggered events.
      - name: alertChannelIds
        type: array
        item_type: string
        required: true
        references:
          resource: instana_alerting_channel
          field: id
        description: >
          Ids of the alerting channels triggered events route to. `references` on
          this array field produces a DAG edge; each
          ${instana_alerting_channel.<ref>.id} element resolves at apply.
      - name: syntheticTestIds
        type: array
        item_type: string
        required: true
        references:
          resource: instana_synthetic_test
          field: id
        description: >
          Ids of the synthetic tests this alert evaluates. `references` on this
          array field produces a DAG edge → tests are ordered before this alert and
          each ${instana_synthetic_test.<ref>.id} element resolves at apply.
      - name: rule
        type: object
        required: true
        description: >
          SyntheticAlertRule (e.g. failure rate). Server-normalized on read, so
          excluded from state_fields.
      - name: tagFilterExpression
        type: object
        required: true
        description: >
          Tag-filter selector narrowing which test runs the rule applies to.
          Server-normalized on read, so excluded from state_fields.
      - name: timeThreshold
        type: object
        required: true
        description: >
          SyntheticTimeThreshold — how long/often the condition must hold to
          trigger. Server-normalized on read, so excluded from state_fields.
      - name: customPayloadFields
        type: array
        item_type: object
        required: true
        description: >
          Custom key/value fields attached to triggered events (may be an empty
          array). Server-normalized on read, so excluded from state_fields.
      - name: severity
        type: integer
        required: false
        description: Event severity (server may default). Optional → excluded from state_fields.
      - name: gracePeriod
        type: integer
        required: false
        description: Grace period in ms before re-triggering. Optional → excluded from state_fields.
  reconciliation:
    # GET /api/events/settings/global-alert-configs/synthetics returns a BARE ARRAY
    # of SyntheticAlertConfigWithMetadata -> no list_field, no ENVELOPE_KEYS change.
    # Identity match on `name`. Soft-delete: active-configs list omits destroyed.
    discovery:
      method: list_and_get
      id_source: id
      name_field: name
    # state_fields = writable scalars only (name/description); read-model metadata
    # and all object/array fields excluded to avoid phantom Update{} drift.
    # Phase 5 may widen (Invariant I4).
    state_fields:
      - name
      - description
    update_strategy: replace
    immutable_fields: []
