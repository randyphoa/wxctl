resource:
  name: instana_application_alert_config
  service: instana
  kind: instana_application_alert_config
  version: v1
  description: >
    An Instana application smart alert (ApplicationAlertConfig) evaluates a rule
    (erroneous-call-rate, latency, throughput, ...) over an application
    perspective's calls and routes triggered events to alerting channels.
    Created via the Events settings API
    (/api/events/settings/application-alert-configs) and identified by a
    server-assigned string id; the human identifier is `name`. Update is the
    smart-alert quirk POST /{id} with the full config body (update_strategy:
    replace); the enable/disable, versions, restore, and update-baseline
    endpoints are out of scope. DELETE is a SOFT delete — the list endpoint
    (findAllActive) returns only active configs, so discovery never resurrects a
    destroyed alert.
  # Instana's config API is identical on SaaS and self-hosted, so the kind is
  # deployment-neutral: no unsupported_on -> supported on saas + software.
  api:
    base_path: /api/events/settings/application-alert-configs
    id_field: id
    list_endpoint: /api/events/settings/application-alert-configs
    get_endpoint: /api/events/settings/application-alert-configs/{id}
    create_endpoint: /api/events/settings/application-alert-configs
    create_method: POST
    update_endpoint: /api/events/settings/application-alert-configs/{id}
    # Smart-alert family quirk: update is POST /{id} (not PUT/PATCH).
    update_method: POST
    delete_endpoint: /api/events/settings/application-alert-configs/{id}
    delete_method: DELETE
  schema:
    fields:
      # -- Server-assigned / read-model metadata (read-only; excluded from state_fields) --
      - name: id
        type: string
        location: Computed
        immutable: true
        description: Server-assigned application-alert-config id (top-level `id` on create/list/get).
      # -- Writable (ApplicationAlertConfig) --
      - name: name
        type: string
        required: true
        description: Smart-alert display name; Instana's human identifier (matched on during discovery).
      - name: description
        type: string
        required: true
        description: Alert description shown on triggered events.
      - name: alertChannelIds
        type: array
        item_type: string
        required: true
        references:
          resource: instana_alerting_channel
          field: id
        description: >
          Ids of the alerting channels triggered events route to. `references` on
          this array field DOES produce a DAG edge (build.rs edges any field with
          a references block, scalar or array) → channels are ordered before this
          alert and each ${instana_alerting_channel.<ref>.id} element resolves.
      - name: applications
        type: object
        required: false
        description: >
          Scoping map keyed by application-perspective id. OMIT this field and
          scope via the top-level applicationId instead: the live API requires
          exactly one entry whose KEY equals the value's applicationId, map keys
          cannot carry ${...} references (the resolver templates values only),
          and the server derives this map from applicationId automatically.
          Excluded from state_fields (server-derived).
      - name: applicationId
        type: string
        required: false
        references:
          resource: instana_application_perspective
          field: id
          optional: true
        description: >
          Optional single-perspective scope. Carries the app-alert -> perspective
          DAG edge (the top-level scalar the graph can edge, unlike the `applications`
          map). Optional: the example may instead scope via the `applications` map.
      - name: boundaryScope
        type: string
        required: true
        allowed_values: [ALL, INBOUND]
        description: Trace boundary scope the rule evaluates over.
      - name: evaluationType
        type: string
        required: true
        allowed_values: [PER_AP, PER_AP_SERVICE, PER_AP_ENDPOINT]
        description: Granularity at which the rule is evaluated.
      - name: granularity
        type: integer
        required: true
        allowed_values: ["60000", "300000", "600000", "900000", "1200000", "1800000"]
        description: Evaluation window in milliseconds.
      - name: tagFilterExpression
        type: object
        required: true
        description: >
          Tag-filter selector narrowing which calls the rule applies to.
          Server-normalized on read, so excluded from state_fields.
      - name: timeThreshold
        type: object
        required: true
        description: >
          ApplicationTimeThreshold — how long/often the condition must hold to
          trigger. Server-normalized on read, so excluded from state_fields.
      - name: customPayloadFields
        type: array
        item_type: object
        required: true
        description: >
          Custom key/value fields attached to triggered events (may be an empty
          array). Server-normalized on read, so excluded from state_fields.
      - name: rule
        type: object
        required: false
        description: >
          Single ApplicationAlertRule (throughput / errorRate / latency / ...).
          Server-normalized on read, so excluded from state_fields.
      - name: rules
        type: array
        item_type: object
        required: false
        description: >
          Multi-rule variant (RuleWithThreshold entries). Server-normalized on
          read, so excluded from state_fields.
      - name: threshold
        type: object
        required: false
        description: Static/adaptive threshold for the rule. Excluded from state_fields.
      - name: severity
        type: integer
        required: false
        description: >
          Event severity (server may default). Optional → excluded from
          state_fields. REQUIRED by the live API whenever `rule`+`threshold`
          are used (422 "threshold, rule and severity has to be defined when
          rules field is not provided") — the config-level `required: false`
          stays, since the multi-`rules` variant doesn't need it.
      - name: gracePeriod
        type: integer
        required: false
        description: Grace period in ms before re-triggering. Optional → excluded from state_fields.
      - name: triggering
        type: boolean
        required: false
        description: Whether the alert also opens an incident. Optional → excluded from state_fields.
      - name: includeInternal
        type: boolean
        required: false
        description: Include internal calls in evaluation.
      - name: includeSynthetic
        type: boolean
        required: false
        description: Include synthetic calls in evaluation.
  reconciliation:
    # GET /api/events/settings/application-alert-configs (findAllActive) returns a
    # BARE ARRAY of ApplicationAlertConfigWithMetadata -> no list_field, no
    # ENVELOPE_KEYS change. Identity match on `name` (schema_reconciler default),
    # set explicitly. Soft-delete: the active-configs list omits destroyed alerts.
    discovery:
      method: list_and_get
      id_source: id
      name_field: name
    # state_fields = writable scalars that round-trip cleanly. The read model adds
    # id/created/initialCreated/enabled/readOnly (server-managed) and every object/
    # array field is server-normalized -> all excluded to avoid phantom Update{}
    # drift (docs/troubleshoot/openscale-monitor-instance-reapply-phantom-drift.md).
    # Phase 5 may widen once live round-trips are verified clean (Invariant I4).
    state_fields:
      - name
      - description
      - boundaryScope
      - evaluationType
      - granularity
    update_strategy: replace
    immutable_fields: []
