  reconciliation:
    # GET /api/settings/api-tokens returns a BARE ARRAY of ApiToken -> no list_field.
    # Identity source is the client-supplied internalId; match on `name`.
    discovery:
      method: list_and_get
      id_source: internalId
      name_field: name
    # state_fields = name (match) + canConfigureReleases (one boolean, proves a
    # clean round-trip -- K4 editable field). accessGrantingToken (sensitive),
    # expiresOn, and the other ~85 booleans stay OUT of state_fields to avoid
    # phantom drift across that many server-defaulted flags (OQ4). `internalId`
    # deliberately STAYS OUT (unlike RBAC group/team's Computed `id`): it's a
    # real user-declared field here, and this backend ignores the client-
    # supplied value (see immutable_fields note below) -- putting it in
    # state_fields would compare the (always-different) local vs remote value
    # and phantom-drift forever. PUT /settings/api-tokens/{internalId} still
    # 500s without SOME internalId in the body, but update.rs's default path
    # now injects the server-discovered value unconditionally for PUT
    # (execution/operations/update.rs), so no state_fields entry is needed.
    state_fields:
      - name
      - canConfigureReleases
    update_strategy: replace
    # internalId is NOT in immutable_fields despite the field-level doc calling
    # it client-supplied identity: live-probed 2026-07-14 against a CE 1.11.0 backend
    # (Instana Custom Edition 1.11.0) -- the backend silently ignores the
    # client-supplied internalId on create and always assigns its own opaque
    # value (e.g. request "wxctl-ci-token" -> stored "DAuvfzI1S2611RfVWc_CjA").
    # Discovery already matches on `name` (name_field above), so identity is
    # sound without internalId; putting internalId in immutable_fields against
    # a backend that won't honor it means every plan sees local != remote on
    # that field forever -> an endless Recreate churn that never converges.
    # Widen back to `[internalId]` only after confirming a backend that
    # actually round-trips the client-supplied value.
    immutable_fields: []

  deployments: {}
  unsupported_on: []
