resource:
  name: instana_api_token
  service: instana
  kind: instana_api_token
  version: v1
  description: >
    An Instana API token (ApiToken) created via /api/settings/api-tokens; the
    identity is a CLIENT-SUPPLIED `internalId` (also the path param), the human
    identifier is `name`. `accessGrantingToken` is the secret bearer value used
    on the wire as the API key -- marked sensitive so every sink (logs, run
    records, diffs) redacts it; the example supplies it via
    `${env:INSTANA_APITOKEN_GRANT}`. The remaining ~86 fields are per-permission
    booleans (canConfigure*/canView*/canCreate*/... plus limited*Scope flags),
    all optional and server-defaulted; kept out of state_fields (except one) to
    avoid phantom drift across that many booleans (OQ4).
  # Instana's config API is identical on SaaS and self-hosted, so the kind is
  # deployment-neutral: no unsupported_on -> supported on saas + software.
  api:
    base_path: /api/settings/api-tokens
    id_field: internalId
    list_endpoint: /api/settings/api-tokens
    # OpenAPI item paths use {internalId}; endpoint placeholders must match
    # id_field (docs/troubleshoot/endpoint-placeholder-must-match-id-field-fix.md).
    get_endpoint: /api/settings/api-tokens/{internalId}
    create_endpoint: /api/settings/api-tokens
    create_method: POST
    update_endpoint: /api/settings/api-tokens/{internalId}
    update_method: PUT
    delete_endpoint: /api/settings/api-tokens/{internalId}
    delete_method: DELETE
  schema:
    fields:
      # -- Identity (CLIENT-SUPPLIED, ApiToken required: internalId, name, accessGrantingToken) --
      - name: internalId
        type: string
        required: true
        immutable: true
        description: >
          CLIENT-SUPPLIED api-token id (path identity / id_field). Immutable -- a
          different internalId is a different token.
      - name: name
        type: string
        required: true
        description: Token display name; Instana's human identifier (matched on during discovery).
      - name: accessGrantingToken
        type: string
        required: true
        sensitive: true
        description: >
          The token's secret bearer value (credential; redacted at emission).
          Supply via ${env:INSTANA_APITOKEN_GRANT} in examples, never inline.
      - name: expiresOn
        type: integer
        required: false
        description: Token expiry, epoch milliseconds. Omit for a non-expiring token.
      - name: id
        type: string
        location: Computed
        immutable: true
        description: Server-assigned token id (top-level `id` on create/list/get; distinct from the client-supplied `internalId`).
      # -- Permission booleans (ApiToken; all optional, server-defaulted) --
      - name: canConfigureAgentRunMode
