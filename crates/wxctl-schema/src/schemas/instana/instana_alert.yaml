resource:
  name: instana_alert
  service: instana
  kind: instana_alert
  version: v1
  description: >
    An Instana alerting configuration (AlertingConfiguration,
    /api/events/settings/alerts) routes events that match an event filter to one
    or more alerting channels — the only API mechanism for delivering custom-event
    notifications to an external channel. CREATE IS A QUIRK: there is NO POST — a
    configuration is created (and updated) by the same idempotent upsert
    PUT /api/events/settings/alerts/{id} with a CLIENT-SUPPLIED id (AlertHandler
    owns both pre_create and pre_update). Discovery is get_by_id off that client
    id: absent -> create, present -> state-compare. The read-only /alerts/infos
    endpoint is out of scope.
  # Instana's config API is identical on SaaS and self-hosted, so the kind is
  # deployment-neutral: no unsupported_on -> supported on saas + software.
  api:
    base_path: /api/events/settings/alerts
    id_field: id
    list_endpoint: /api/events/settings/alerts
    get_endpoint: /api/events/settings/alerts/{id}
    # No POST. Create is the PUT-upsert owned by AlertHandler.pre_create; this
    # endpoint/method is display-only (the default POST is skipped on Handled).
    create_endpoint: /api/events/settings/alerts/{id}
    create_method: PUT
    # Update is the same PUT-upsert, owned by AlertHandler.pre_update (unlike the
    # maintenance kind, which left update to the default path). The default update
    # path prunes the body to state_fields (execution/operations/update.rs), which
    # would drop the API-required id/customPayloadFields — so update is handler-owned.
    update_endpoint: /api/events/settings/alerts/{id}
    update_method: PUT
    delete_endpoint: /api/events/settings/alerts/{id}
    delete_method: DELETE
  schema:
    fields:
      # -- Client-supplied identity (rides the PUT body AND is the get_by_id id_source) --
      - name: id
        type: string
        required: true
        immutable: true
        description: >
          CLIENT-SUPPLIED alerting-configuration id. Required in the
          AlertingConfiguration PUT body AND the get_by_id discovery id_source
          (delete.rs/update.rs substitute it into /{id}). Immutable — a different
          id is a different configuration.
      # -- Writable (AlertingConfiguration required: alertName, integrationIds, eventFilteringConfiguration) --
      - name: alertName
        type: string
        required: true
        validation:
          max_length: 256
        description: Alerting-configuration display name.
      - name: integrationIds
        type: array
        item_type: string
        required: true
        references:
          resource: instana_alerting_channel
          field: id
        description: >
          Ids of the alerting channels matched events route to. `references` on
          this top-level array field produces a DAG edge (build.rs edges any field
          with a references block, scalar or array) → channels are ordered before
          this configuration and each ${instana_alerting_channel.<ref>.id} element
          resolves. Proven pattern: `alertChannelIds` on the four alert-config kinds.
      - name: eventFilteringConfiguration
        type: object
        required: true
        description: >
          EventFilteringConfiguration selecting which events trigger this
          configuration. `ruleIds` scopes to specific custom event specifications;
          `eventTypes`/`query`/`applicationAlertConfigIds` narrow further.
        properties:
          ruleIds:
            type: array
            item_type: string
            references:
              resource: instana_custom_event_spec
              field: id
            description: >
              Ids of the custom event specifications whose events this
              configuration routes. `references` on this NESTED array field
              produces a DAG edge — build.rs recurses into `properties` and edges
              any sub-field carrying a references block (proven pattern:
              tool.binding.python.connections -> orchestrate_connection) → event
              specs are ordered before this configuration and each
              ${instana_custom_event_spec.<ref>.id} element resolves.
          eventTypes:
            type: array
            item_type: string
            description: >
              Event severities/types this configuration matches (allowed values:
              incident, critical, warning, change, online, offline,
              agent_monitoring_issue, cve_issue, none).
          query:
            type: string
            description: Optional Dynamic Focus query narrowing the matched entities (max 2048).
          applicationAlertConfigIds:
            type: array
            item_type: string
            description: Optional application-alert-config ids the filter is scoped to.
      - name: customPayloadFields
        type: array
        item_type: object
        required: false
        default: []
        description: >
          Custom key/value fields attached to routed events. API-required, but
          `default: []` (with schema required:false, per the agent.yaml pattern)
          lets configs omit it — always sent as `[]` on the wire. Rides the PUT
          body; the default update path would prune it, so update is handler-owned.
      - name: muteUntil
        type: integer
        required: false
        description: >
          Absolute epoch-MILLISECONDS timestamp until which this configuration is
          muted — NOT a duration. `0` = enabled (not muted). The declarative
          on-stage mute knob: set to a far-future epoch to silence delivery, revert
          to `0` to resume.
      - name: includeEntityNameInLegacyAlerts
        type: boolean
        required: false
        description: Include the entity name in legacy alert payloads (server default).
  reconciliation:
    # Discovery is get_by_id off the CLIENT-SUPPLIED id (id_source: id): GET
    # /api/events/settings/alerts/{id} -> 200 (state-compare) / 404 (create). The
    # upsert PUT is idempotent by construction (AlertHandler owns create + update).
    discovery:
      method: get_by_id
      id_source: id
    # state_fields = the FULL writable set (minus the immutable id). Updates are
    # handler-owned (AlertHandler PUTs the full UPSERT_FIELDS body), so pruning is
    # moot and state_fields drives DRIFT DETECTION only. Safe per the 2026-07-12
    # values_match semantics: config-absent fields are skipped, server-added object
    # keys are ignored, numbers compare by value -> no phantom Update{} drift.
    state_fields:
      - alertName
      - integrationIds
      - eventFilteringConfiguration
      - customPayloadFields
      - muteUntil
      - includeEntityNameInLegacyAlerts
    update_strategy: replace
    immutable_fields:
      - id
