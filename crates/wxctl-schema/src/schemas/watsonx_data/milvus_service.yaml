resource:
  name: milvus_service
  service: watsonx_data
  kind: milvus_service
  version: v1
  description: >
      A Milvus Service is the managed Milvus vector store in watsonx.data — the
      vector backend for embeddings / similarity search (e.g. RAG knowledge bases).
      It is provisioned asynchronously (create returns 202): `storage_name` selects
      the registered object-storage bucket that backs it and `root_path` is the
      prefix under that bucket where vectors are stored. Pause and resume are modeled
      as desired-state transitions on the top-level `status` field — the `pre_update`
      handler translates a `status` change into the corresponding `/pause` or
      `/resume` action endpoint rather than a PATCH.

  api:
    base_path: /v3/milvus_services
    id_field: id
    list_endpoint: /v3/milvus_services?limit=100
    get_endpoint: /v3/milvus_services/{id}
    create_endpoint: /v3/milvus_services
    create_method: POST
    update_endpoint: /v3/milvus_services/{id}
    update_method: PATCH
    delete_endpoint: /v3/milvus_services/{id}
    delete_method: DELETE

  schema:
    fields:
      - name: id
        type: string
        required: false
        location: Computed
        immutable: true
        description: >
            Unique identifier assigned by the API during service creation
            (e.g. `milvus76`).

      - name: display_name
        type: string
        required: true
        description: >
            Human-readable service name shown in the watsonx.data UI. Unique
            within the instance.
        validation:
          min_length: 1
          max_length: 128

      - name: origin
        type: string
        required: true
        default: native
        allowed_values: [native]
        description: >
            Service origin. `native` is a Milvus service provisioned inside
            watsonx.data. The only supported value at creation time.

      - name: root_path
        type: string
        required: true
        immutable: true
        description: >
            Path prefix within the backing storage where Milvus vectors are
            stored, e.g. `milvus/vectors`. Create-only.
        validation:
          min_length: 1
          max_length: 128
          pattern: "^[a-zA-Z0-9-_/]+$"

      - name: tshirt_size
        type: string
        required: true
        immutable: true
        default: small
        allowed_values: [starter, small, medium, large, custom]
        description: >
            Predefined size profile for the service. Create-only — resizing goes
            through the `/scale` endpoint (out of scope), so a change here is
            ignored (excluded from drift detection).

      - name: storage_name
        type: string
        required: false
        immutable: true
        description: >
            The registered watsonx.data storage that backs this service's vector
            data. Accepts a ${storage_registration.<ref>} ref (resolved to the
            registration's id) or a plain storage name string.
        references:
          resource: storage_registration
          field: id

      - name: description
        type: string
        required: false
        description: >
            Optional free-text description of the service's purpose (max 50 chars).
        validation:
          min_length: 1
          max_length: 50

      - name: tags
        type: array
        required: false
        item_type: string
        description: >
            Free-form tags for organizing and filtering services.

      - name: index_type
        type: string
        required: false
        immutable: true
        allowed_values: [ivf_sq8, ivf_pq, hnsw]
        description: >
            Vector index algorithm. Accepted by the create API only when
            `tshirt_size: custom` — the predefined sizes carry a fixed index
            type and reject an override (HTTP 400). Create-only; excluded from
            drift detection.

      - name: vector_dimension
        type: integer
        required: false
        immutable: true
        description: >
            Dimensionality of stored vectors (384-4000). Accepted by the create
            API only when `tshirt_size: custom` — predefined sizes reject it with
            HTTP 400 "VectorDimension can only be used with tshirt_size: custom".
            Create-only; excluded from drift detection.

      - name: status
        type: string
        required: false
        default: running
        allowed_values: [running, paused]
        description: >
            Desired lifecycle state. Setting `paused` triggers
            `POST /v3/milvus_services/{id}/pause`; setting `running` triggers
            `/resume`. Handled in `pre_update` via `HookOutcome::Handled` so the
            transition does not flow through the normal PATCH path. The `pre_create`
            handler strips this field from the create payload — the Milvus create
            API does not accept a `status` input.

  reconciliation:
    discovery:
      method: list_and_get
      list_field: milvus_services
      id_source: id
      name_field: display_name
    state_fields:
      - display_name
      - description
      - tags
      - status
    update_strategy: patch
    use_json_patch: false
    # `origin`, `root_path`, `tshirt_size`, `storage_name`, `index_type`, and
    # `vector_dimension` are create-only inputs the list/get API either omits or
    # reports in an enriched form. They are kept out of state_fields (no drift) and
    # out of immutable_fields (a literal-equality check would spuriously Recreate).
    # Changing them post-create requires recreating the service — same rationale as
    # presto/prestissimo `configuration`.
    immutable_fields: []

  unsupported_on: []
