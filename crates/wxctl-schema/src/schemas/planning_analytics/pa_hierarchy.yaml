resource:
  name: pa_hierarchy
  service: planning_analytics
  kind: pa_hierarchy
  version: v1
  description: >
    A hierarchy within a Planning Analytics (TM1 Database 12) dimension — a named tree of
    members (`elements`) and parent/child consolidations (`edges`). Created under its parent
    dimension (POST /Dimensions('{dimension}')/Hierarchies) and identified by its `name`
    within that dimension. Use pa_hierarchy for a secondary/alternate hierarchy; a
    dimension's primary hierarchy is authored inline on pa_dimension.
  api:
    base_path: /Dimensions('{dimension}')/Hierarchies
    id_field: name
    list_endpoint: /Dimensions('{dimension}')/Hierarchies
    get_endpoint: /Dimensions('{dimension}')/Hierarchies('{name}')
    create_endpoint: /Dimensions('{dimension}')/Hierarchies
    create_method: POST
    update_endpoint: /Dimensions('{dimension}')/Hierarchies('{name}')
    update_method: PATCH
    delete_endpoint: /Dimensions('{dimension}')/Hierarchies('{name}')
    delete_method: DELETE
  schema:
    fields:
      - name: name
        type: string
        required: true
        api_field: Name
        validation:
          pattern: "^[^']+$"
        description: Hierarchy name — the OData entity key within the dimension. Immutable identity.
      - name: dimension
        type: string
        required: true
        location: Path
        validation:
          pattern: "^[^']+$"
        description: >
          Parent dimension name. Interpolated into every endpoint's `{dimension}` segment
          (location: Path — never rides the body). Its `references` block yields the DAG
          edge pa_dimension -> pa_hierarchy.
        references:
          resource: pa_dimension
          field: name
      - name: elements
        type: array
        item_type: object
        required: false
        api_field: Elements
        description: Members of the hierarchy.
        schema:
          fields:
            - name: name
              type: string
              required: true
              api_field: Name
              validation:
                pattern: "^[^']+$"
              description: Element (member) name.
            - name: element_type
              type: string
              required: false
              api_field: Type
              allowed_values: ["Numeric", "String", "Consolidated"]
              description: TM1 element type.
      - name: edges
        type: array
        item_type: object
        required: false
        api_field: Edges
        description: Parent/child consolidation relationships.
        schema:
          fields:
            - name: parent_name
              type: string
              required: true
              api_field: ParentName
              description: Consolidated parent element name.
            - name: component_name
              type: string
              required: true
              api_field: ComponentName
              description: Child (component) element name.
            - name: weight
              type: float
              required: false
              api_field: Weight
              description: Consolidation weight (defaults to 1 on the server).
  reconciliation:
    discovery:
      method: get_by_id
      id_source: name
    # elements/edges excluded from state_fields for the same reason as pa_dimension.hierarchies:
    # TM1 enriches them on read (auto "Leaves" hierarchy, computed attributes) so they do not
    # round-trip offline — a Phase-4 (live) concern.
    state_fields:
      - name
    update_strategy: patch
    use_json_patch: false
    # Path parents are NOT in immutable_fields: the server never echoes Path fields back,
    # so declared-vs-missing would phantom-Recreate on every re-plan (concert_workflow_schedule
    # precedent). Parent immutability is structural: a different parent = a different identity.
    immutable_fields:
      - name
