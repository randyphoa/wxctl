resource:
    name: script_asset
    service: common_core
    kind: script_asset
    version: v1
    description: >
        A Script Asset uploads a local Python file into a watsonx.ai project (or space) as a
        CAMS asset of type `script`, exposing its asset id for a platform job to run. Create
        mirrors the data_asset 3-step presigned sequence: POST /v2/assets creates the asset
        shell (entity.script.ml_version 4.0.0), POST .../attachments returns a presigned target,
        the bytes are PUT to it, and POST .../complete finalizes. Discovery enumerates the
        scope's script assets via the CAMS search POST (/v2/asset_types/script/search) and
        matches by name, so re-apply is idempotent (no stored id needed) and destroy resolves
        the asset id.
    api:
        base_path: /v2/assets
        id_field: asset_id
        list_endpoint: /v2/asset_types/script/search
        get_endpoint: /v2/assets/{asset_id}
        create_method: POST
        delete_method: DELETE
        delete_endpoint: /v2/assets/{asset_id}
    schema:
        fields:
            - name: name
              type: string
              required: true
              description: Script asset name (shown in the project catalog).
              validation:
                  min_length: 1
                  max_length: 255
            - name: description
              type: string
              required: false
              description: Human-readable description.
            - name: language
              type: string
              required: false
              default: python3
              description: Script language. Defaults to python3.
            - name: software_spec
              type: string
              required: false
              description: >
                  Base software specification name (e.g. runtime-25.1-py3.12). Carried into
                  entity.script.runtime when present. Name-to-id resolution is wired live in Phase 5.
            - name: source_path
              type: string
              required: true
              location: LocalOnly
              is_path: true
              description: >
                  Local path to the Python file to upload. Resolved against the config file's directory.
            - name: space_id
              type: string
              required: false
              location: Query
              description: The space ID scope (space_id XOR project_id).
              references:
                  resource: space
                  field: id
                  optional: true
            - name: project_id
              type: string
              required: false
              location: Query
              description: The project ID scope (space_id XOR project_id).
              references:
                  resource: project
                  field: guid
                  optional: true
            - name: asset_id
              type: string
              required: false
              location: Computed
              immutable: true
              description: The unique id of the script asset.
            - name: created_at
              type: timestamp
              required: false
              location: Computed
              immutable: true
              description: Creation timestamp.
    reconciliation:
        discovery:
            method: list_and_get
            id_source: asset_id
            list_field: results
            list_method: post
            list_body:
                query: "asset.asset_type:script"
        state_fields:
            - name
            - description
        update_strategy: recreate
        immutable_fields: []

    deployments:
        "software-5.3":
            api: {}
    unsupported_on: []
