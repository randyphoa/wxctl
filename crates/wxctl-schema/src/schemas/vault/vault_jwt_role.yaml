resource:
  name: vault_jwt_role
  service: vault
  kind: vault_jwt_role
  version: v1
  description: >
    A role on a Vault JWT auth backend (auth/{backend}/role/{name}) â€” binds token
    audiences, the identity claim, and token policies for OIDC logins. Created via an
    idempotent upsert (POST /v1/auth/{backend}/role/{name}, 204). Listed with
    ?list=true (the {"data":{"keys":[...]}} envelope, bare role names). The `backend`
    field references the parent vault_auth_method by its `path`. Vault is
    deployment-flavor-neutral (no unsupported_on).
  api:
    base_path: /v1/auth/{backend}/role
    id_field: name
    list_endpoint: /v1/auth/{backend}/role?list=true
    get_endpoint: /v1/auth/{backend}/role/{name}
    create_endpoint: /v1/auth/{backend}/role/{name}
    create_method: POST
    update_endpoint: /v1/auth/{backend}/role/{name}
    update_method: POST
    delete_endpoint: /v1/auth/{backend}/role/{name}
    delete_method: DELETE
  schema:
    fields:
      - name: name
        type: string
        required: true
        immutable: true
        location: Path
        description: Role name â€” the id and the {name} path segment. Immutable.
      - name: backend
        type: string
        required: true
        location: Path
        description: >
          Parent JWT auth mount path. location: Path â€” fills every endpoint's {backend}
          segment, never rides the body. Its references block yields the DAG edge
          vault_auth_method -> vault_jwt_role.
        references:
          resource: vault_auth_method
          field: path
      - name: role_type
        type: string
        required: false
        description: JWT role type (use `jwt`).
      - name: bound_audiences
        type: array
        item_type: string
        required: false
        description: Audiences (`aud`) accepted from the token.
      - name: user_claim
        type: string
        required: false
        description: Token claim used as the Vault identity alias (e.g. `sub`).
      - name: groups_claim
        type: string
        required: false
        description: Token claim carrying group membership (IBM Verify uses `groupIds`).
      - name: token_ttl
        type: integer
        required: false
        description: Default TTL (seconds) for issued tokens.
      - name: token_max_ttl
        type: integer
        required: false
        description: Maximum TTL (seconds) for issued tokens.
      - name: token_policies
        type: array
        item_type: string
        required: false
        description: Base policies attached to tokens issued via this role.
  reconciliation:
    discovery:
      method: list_and_get
      id_source: name
    # Present/absent by name drives create-vs-noop (vault_policy precedent); role config
    # is not round-tripped here (Phase-4 live may widen).
    state_fields: []
    update_strategy: replace
    # name/backend are structural (endpoint path); the role read does not echo them, so
    # listing them would phantom-Recreate (pa_hierarchy / concert_source_repo precedent).
    immutable_fields: []
  prompt:
    notes:
      - "`name` is the role name and id; `backend` is the parent JWT mount path â€” set it to `${vault_auth_method.<ref>.path}`."
      - "Set `role_type: jwt`, `user_claim` (e.g. `sub`), and `token_policies` for authorization."
      - "`groups_claim` maps external group membership (IBM Verify: `groupIds`) used by vault_group_alias."
    examples:
      minimal: |
        kind: vault_jwt_role
        ref_name: agent_role
        name: agent-role
        backend: ${vault_auth_method.ibm_verify.path}
        role_type: jwt
        user_claim: sub
        token_policies:
          - default
      full: |
        kind: vault_jwt_role
        ref_name: agent_role
        name: agent-role
        backend: ${vault_auth_method.ibm_verify.path}
        role_type: jwt
        bound_audiences:
          - vault
        user_claim: sub
        groups_claim: groupIds
        token_ttl: 3600
        token_max_ttl: 86400
        token_policies:
          - default
