resource:
  name: vault_secret_engine
  service: vault
  kind: vault_secret_engine
  version: v1
  description: >
    A HashiCorp Vault database secrets engine mount (sys/mounts/{path}, type=database).
    Enabling the mount (POST /v1/sys/mounts/{path}, body {"type":"database"}) is followed
    by a database connection-config sub-write (POST /v1/{path}/config/{db_name}) issued in
    the handler's post_create — the connection fields (plugin_name, connection_url,
    username, password, allowed_roles, verify_connection) ride that sub-write, not the
    enable body. `password` is marked sensitive and redacted at emission on the sub-write
    RequestSpec. `verify_connection: false` skips Vault's live database reachability check
    (mount + config still created); true (Vault's default) fails the sub-write against an
    unreachable database. Vault is deployment-flavor-neutral (no unsupported_on).
  api:
    base_path: /v1/sys/mounts
    id_field: path
    list_endpoint: /v1/sys/mounts
    get_endpoint: /v1/sys/mounts/{path}
    create_endpoint: /v1/sys/mounts/{path}
    create_method: POST
    update_endpoint: /v1/sys/mounts/{path}
    update_method: POST
    delete_endpoint: /v1/sys/mounts/{path}
    delete_method: DELETE
  schema:
    fields:
      - name: path
        type: string
        required: true
        immutable: true
        location: Path
        description: >
          Mount path (the id) and the {path} segment on every endpoint. location: Path
          so it fills the placeholder and never rides the enable body. Immutable: a
          different path is a different mount. Referenced by vault_database_role.mount.
      - name: type
        type: string
        required: true
        description: >
          Secret engine type. The field sent on the enable body
          (POST /v1/sys/mounts/{path} → {"type": <this>}). Use `database`.
      - name: description
        type: string
        required: false
        description: Optional human description sent on the enable body.
      - name: db_name
        type: string
        required: true
        location: LocalOnly
        description: >
          Database connection name. LocalOnly: not sent on the enable body; the handler
          uses it to build the connection-config sub-write endpoint
          (POST /v1/{path}/config/{db_name}). vault_database_role.db_name must match it.
      - name: plugin_name
        type: string
        required: true
        location: LocalOnly
        description: >
          Vault database plugin (e.g. `postgresql-database-plugin`). LocalOnly: rides the
          connection-config sub-write body.
      - name: connection_url
        type: string
        required: true
        location: LocalOnly
        description: >
          Templated database connection URL (e.g.
          `postgresql://{{username}}:{{password}}@db:5432/app`). LocalOnly: rides the
          connection-config sub-write body.
      - name: username
        type: string
        required: false
        location: LocalOnly
        description: >
          Root/admin database username Vault rotates roles under. LocalOnly: rides the
          connection-config sub-write body.
      - name: password
        type: string
        required: false
        location: LocalOnly
        sensitive: true
        # sensitive: true -> the SecretEngineHandler marks the emitted `password` key
        # sensitive on the sub-write RequestSpec so the value is redacted at emission
        # (RequestSpec.sensitive_paths; pa_user Password precedent, spec AC7). LocalOnly,
        # so it is not part of the mount enable body and never round-tripped on discovery.
        description: >
          Root/admin database password. LocalOnly + sensitive: rides the connection-config
          sub-write body and is redacted at emission.
      - name: allowed_roles
        type: array
        item_type: string
        required: false
        location: LocalOnly
        description: >
          Role names permitted to use this connection (Vault accepts `*`). LocalOnly:
          rides the connection-config sub-write body.
      - name: verify_connection
        type: boolean
        required: false
        location: LocalOnly
        description: >
          Whether Vault verifies the database is reachable at config time. LocalOnly:
          rides the connection-config sub-write body. Set `false` to create the mount +
          config without a reachable database; `true` (Vault's default) fails against an
          unreachable database.
  reconciliation:
    # list_map discovery against GET /v1/sys/mounts, which returns an object map
    # {"data": {"database/": {...}}} keyed by mount path. get_by_id is unusable here:
    # an absent mount 400s (GET /v1/sys/mounts/{path} -> "No secret engine mount at
    # database/"), not 404, so the reconciler would surface it as an error rather than
    # "create". list_map reads the map keys (trailing "/" stripped) and matches `path`
    # (live-pinned 2026-07-10 against Vault/OpenBao 2.0.3).
    discovery:
      method: list_and_get
      id_source: path
      name_field: path
      list_map: true
    # Empty for the same reason as vault_auth_method: present/absent by mount path fully
    # drives create-vs-noop; the connection config lives at a different endpoint and is not
    # round-tripped here (Phase-4 live may widen).
    state_fields: []
    update_strategy: replace
    # path is not echoed by GET /v1/sys/mounts/{path} in the shape we compare; listing it
    # would phantom-Recreate (pa_hierarchy / vault_auth_method precedent). Identity is
    # structural via the mount path.
    immutable_fields: []
  prompt:
    notes:
      - "`path` is the mount path and the id (e.g. `database`); it fills every endpoint's {path} segment and is immutable. Reference it from vault_database_role.mount as `${vault_secret_engine.<ref>.path}`."
      - "Set `type: database`. The connection fields (`plugin_name`, `connection_url`, `username`, `password`, `allowed_roles`, `verify_connection`) are written to the connection-config sub-write by the handler, not the enable call."
      - "`db_name` names the connection and fills the sub-write endpoint; set `verify_connection: false` to provision without a reachable database."
    examples:
      minimal: |
        kind: vault_secret_engine
        ref_name: employee_db
        path: database
        type: database
        db_name: employee-db
        plugin_name: postgresql-database-plugin
        connection_url: postgresql://{{username}}:{{password}}@postgres:5432/employees?sslmode=disable
        verify_connection: false
      full: |
        kind: vault_secret_engine
        ref_name: employee_db
        path: database
        type: database
        description: Employee database dynamic-credentials engine
        db_name: employee-db
        plugin_name: postgresql-database-plugin
        connection_url: postgresql://{{username}}:{{password}}@postgres:5432/employees?sslmode=disable
        username: vault_admin
        password: ${env:EMPLOYEE_DB_PASSWORD}
        allowed_roles:
          - employee-reader
        verify_connection: false
