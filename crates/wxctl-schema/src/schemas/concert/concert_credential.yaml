resource:
  name: concert_credential
  service: concert
  kind: concert_credential
  version: v1
  description: >
    A Concert credential is a named key/value secret bundle used by ingestion
    jobs to authenticate against source systems. Created via the Concert core API
    (POST /core/api/v1/credentials). Deletion is a COLLECTION operation
    (DELETE /core/api/v1/credentials?delete_ids={id}) — there is no item DELETE —
    handled by the custom CredentialHandler. The secret material in
    credentials[].value is redacted at emission. Identified by a server-assigned UUID.
  # Concert has no published SaaS API — software deployment only (spec Non-Goal).
  unsupported_on: [saas]
  api:
    base_path: /core/api/v1/credentials
    id_field: id
    list_endpoint: /core/api/v1/credentials
    get_endpoint: /core/api/v1/credentials/{id}
    create_endpoint: /core/api/v1/credentials
    create_method: POST
    update_endpoint: /core/api/v1/credentials/{id}
    update_method: PATCH
    # No item DELETE exists. delete_endpoint points at the COLLECTION (kept
    # non-empty so the descriptor contract test passes); CredentialHandler.pre_delete
    # owns the DELETE, appending ?delete_ids={id} and tolerating an already-absent id.
    delete_endpoint: /core/api/v1/credentials
    delete_method: DELETE
  schema:
    fields:
      # ── Server-assigned / API-enriched (read-only) ──
      - name: id
        type: string
        location: Computed
        immutable: true
        description: Server-assigned credential UUID (returned at top-level `id` on create).
      - name: created_on
        type: integer
        location: Computed
        immutable: true
        description: Epoch-millis creation timestamp set by the API.
      - name: last_updated_on
        type: integer
        location: Computed
        immutable: true
        description: Epoch-millis last-update timestamp set by the API.
      # ── Writable (IngestionjobCredentialPrototype) ──
      - name: name
        type: string
        required: false
        description: Credential display name.
      - name: description
        type: string
        required: false
        description: Free-text credential description.
      - name: type
        type: string
        required: false
        description: >
          Credential type (the source-system connector this credential authenticates).
          Server-enforced enum (Concert 3.0.0.0): one of ec2, s3, jira, github, ecr, eks,
          service_now, kubernetes, iks, concert_workflows. NOTE: Concert validates the
          credential against the target system on create, so `credentials[]` must carry real,
          working keys for the chosen type (e.g. github expects `access_token` + `base_url`) —
          a placeholder value is rejected with HTTP 400.
      - name: credentials
        type: array
        item_type: object
        required: false
        description: >
          Key/value credential properties. Each entry is { key, value }; `value` is
          secret and marked sensitive so it is redacted at emission (sensitive_paths →
          credentials.value). Excluded from state_fields: the API does not return
          `value` on read, so it cannot round-trip.
        schema:
          fields:
            - name: key
              type: string
              required: true
              description: Credential property key.
            - name: value
              type: string
              required: false
              sensitive: true
              description: Credential property value (secret — redacted at emission).
      - name: created_by
        type: string
        required: false
        description: Creator principal (audit; excluded from state_fields).
      - name: expiry
        type: integer
        required: false
        description: Credential expiry (epoch millis).
  reconciliation:
    # GET /core/api/v1/credentials returns { credentials: [...], pagination }; the
    # `credentials` envelope key is registered in wxctl-core ENVELOPE_KEYS (Task 1.2).
    # Discovery lists by name, then GETs by the server-assigned id.
    discovery:
      method: list_and_get
      id_source: id
      list_field: credentials
    # state_fields = round-tripping scalars only. The secret `credentials` array is
    # EXCLUDED (the API never returns `value` on read → it would always look drifted, and
    # excluding it keeps the secret out of the state cache); created_by is an audit field,
    # also excluded (docs/troubleshoot/openscale-monitor-instance-reapply-phantom-drift.md).
    # Phase 4 may widen once live round-trips are verified clean (spec Invariant I4).
    state_fields:
      - name
      - description
      - type
      - expiry
    # Q3: full-object PATCH (replace), not application/merge-patch+json handling.
    # Idempotent for this flat body; live content-type confirmation is Phase 4.
    update_strategy: replace
    immutable_fields: []
