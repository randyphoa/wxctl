# KB + tool combo E2E test — verifies agent picks between KB retrieval and tool invocation.
# Mirrors ADK ibm_knowledge dynamic mode (KB retrieval + tool invocation).
# Placeholders: __TEST_ID__ (uuid), __MANIFEST_DIR__ (crate root)
kind: knowledge_base
ref_name: wxctl_test_kb___TEST_ID__
name: wxctl_test_kb___TEST_ID__
description: Acme Corp company knowledge base
documents:
  - path: __MANIFEST_DIR__/tests/fixtures/kb_docs/company_faq.txt
---
kind: tool
ref_name: wxctl_test_tool___TEST_ID__
name: wxctl_test_tool___TEST_ID__
display_name: wxctl_test_tool___TEST_ID__
description: A calculator tool that can add and multiply numbers
permission: read_write
is_async: false
source_path: __MANIFEST_DIR__/tests/fixtures/calculator_tool
binding:
    python:
        function: calculator:main
---
kind: agent
ref_name: wxctl_test_agent___TEST_ID__
name: wxctl_test_agent___TEST_ID__
display_name: wxctl_test_agent___TEST_ID__
description: >
  You are a versatile assistant with knowledge about Acme Corp and access to a calculator tool.
  For factual questions about Acme Corp, use your knowledge base.
  For math calculations, use the calculator tool.
llm: groq/openai/gpt-oss-120b
style: default
tools:
  - ${tool.wxctl_test_tool___TEST_ID__}
knowledge_base:
  - ${knowledge_base.wxctl_test_kb___TEST_ID__}
chat_with_docs:
  enabled: true
---
kind: test
ref_name: test_kb_question
agent: ${agent.wxctl_test_agent___TEST_ID__}
turns:
  - message: "When was Acme Corp founded and by whom?"
    expect_answer: "Acme Corp was founded in 1987 by Dr. Elena Vasquez"
---
kind: test
ref_name: test_tool_question
agent: ${agent.wxctl_test_agent___TEST_ID__}
turns:
  - message: "What is 42 multiplied by 17?"
    expect_answer: "The result should be 714"
