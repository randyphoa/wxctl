openapi: "3.0.3"
info:
  title: Reference Data API
  description: A public no-auth HTTP API used as a generic reference-data lookup for the claims assistant.
  version: "1.0"
servers:
  - url: https://httpbin.org
paths:
  /get:
    get:
      operationId: echoGet
      summary: Reference-data GET lookup
      description: Returns the query parameters sent in the request, echoed back as JSON.
      parameters:
        - name: query_param
          in: query
          description: A query parameter to echo back
          schema:
            type: string
      responses:
        "200":
          description: Echoed response
          content:
            application/json:
              schema:
                type: object
                properties:
                  args:
                    type: object
  /post:
    post:
      operationId: echoPost
      summary: Reference-data POST lookup
      description: Returns the JSON body sent in the request, echoed back.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: string
      responses:
        "200":
          description: Echoed response
          content:
            application/json:
              schema:
                type: object
