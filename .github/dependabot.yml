# keeps SHA-pinned actions in .github/workflows up to date (bumps both the SHA and the version comment)
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  # keeps Cargo dependencies current; grouped so related bumps land in one PR
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-dependencies:
        patterns:
          - "*"
